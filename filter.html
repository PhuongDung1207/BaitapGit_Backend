<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang HTML Filter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Bạn đã đi qua Filter!</h1>
        <p>Trang này là <b>filter.html</b>, được dùng để minh hoạ một trang giao diện có thể đi qua Java Filter.</p>
        
        <form action="/submit-data" method="POST">
            <input type="text" name="username" placeholder="Nhập tên của bạn" required>
            <button type="submit">Gửi Dữ Liệu</button>
        </form>
    </div>

</body>
</html>
